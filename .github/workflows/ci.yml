name: CI

on:
  push:
    branches: [main]
  pull_request:
    branches: [main]

jobs:
  test:
    runs-on: ubuntu-latest
    strategy:
      matrix:
        node-version: [20, 22]

    steps:
      - uses: actions/checkout@v4

      - run: |
          mkdir -p /tmp/mppsol-deps
          git clone --depth=1 https://github.com/mppsol/core.git /tmp/mppsol-deps/mppsol-core
          ln -s /tmp/mppsol-deps/mppsol-core ../mppsol-core

      - uses: actions/setup-node@v4
        with:
          node-version: ${{ matrix.node-version }}

      - name: Build core
        working-directory: /tmp/mppsol-deps/mppsol-core
        run: npm install && npm run build

      - run: npm install
      - run: npm run build
      - run: npm test
