name: CI

on:
  push:
    branches: [main]
  pull_request:
    branches: [main]

jobs:
  test:
    runs-on: ubuntu-latest
    strategy:
      matrix:
        node-version: [20, 22]

    steps:
      - uses: actions/checkout@v4

      # The package.json declares "@mppsol/core": "file:../mppsol-core".
      # Clone @mppsol/core into a workspace-internal location and symlink
      # it to the expected sibling path so the file: dep resolves.
      - name: Clone @mppsol/core (sibling for file: dep)
        run: |
          mkdir -p $RUNNER_TEMP/mppsol-deps
          git clone --depth=1 https://github.com/mppsol/core.git $RUNNER_TEMP/mppsol-deps/mppsol-core
          ln -sf $RUNNER_TEMP/mppsol-deps/mppsol-core ../mppsol-core

      - name: Setup Node ${{ matrix.node-version }}
        uses: actions/setup-node@v4
        with:
          node-version: ${{ matrix.node-version }}

      - name: Build @mppsol/core
        run: |
          cd $RUNNER_TEMP/mppsol-deps/mppsol-core
          npm install
          npm run build

      - name: Install
        run: npm install

      - name: Build
        run: npm run build

      - name: Test
        run: npm test
