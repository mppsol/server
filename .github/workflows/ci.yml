name: CI

on:
  push:
    branches: [main]
  pull_request:
    branches: [main]

jobs:
  test:
    runs-on: ubuntu-latest
    strategy:
      matrix:
        node-version: [20, 22]

    steps:
      - uses: actions/checkout@v4

      # The package.json declares "@mppsol/core": "file:../mppsol-core".
      # Clone @mppsol/core as a sibling in the runner workspace directory
      # so the file: dep resolves on CI.
      - name: Clone @mppsol/core (sibling for file: dep)
        run: git clone --depth=1 https://github.com/mppsol/core.git ../mppsol-core

      - name: Setup Node ${{ matrix.node-version }}
        uses: actions/setup-node@v4
        with:
          node-version: ${{ matrix.node-version }}

      - name: Build @mppsol/core
        working-directory: ../mppsol-core
        run: |
          npm install
          npm run build

      - name: Install
        run: npm install

      - name: Build
        run: npm run build

      - name: Test
        run: npm test
